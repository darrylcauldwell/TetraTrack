name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      # --- SwiftLint ---
      - name: SwiftLint
        run: |
          if command -v swiftlint &> /dev/null; then
            swiftlint lint --reporter github-actions-logging
          else
            brew install swiftlint
            swiftlint lint --reporter github-actions-logging
          fi

      # --- @Relationship optionality ---
      - name: Check @Relationship optionality
        run: |
          ISSUES=$(grep -A1 "@Relationship" TetraTrack/Models/*.swift TetraTrack/Models/**/*.swift 2>/dev/null \
            | grep -E "var.*\[.*\].*=" \
            | grep -v "\?" || true)
          if [ -n "$ISSUES" ]; then
            echo "::error::Non-optional @Relationship arrays found (breaks CloudKit sync):"
            echo "$ISSUES"
            exit 1
          fi

      # --- MARKETING_VERSION consistency ---
      - name: Check MARKETING_VERSION consistency
        run: |
          VERSIONS=$(grep "MARKETING_VERSION" TetraTrack.xcodeproj/project.pbxproj | sed 's/.*= //' | sed 's/;.*//' | sort -u)
          COUNT=$(echo "$VERSIONS" | wc -l | tr -d ' ')
          if [ "$COUNT" -gt 1 ]; then
            echo "::error::Multiple MARKETING_VERSION values found:"
            echo "$VERSIONS"
            exit 1
          fi
          echo "All targets at MARKETING_VERSION = $(echo "$VERSIONS" | tr -d ' ')"

      # --- App Store metadata limits ---
      - name: Validate metadata character limits
        run: |
          if [ -x Scripts/validate_metadata.sh ]; then
            Scripts/validate_metadata.sh
          else
            echo "validate_metadata.sh not found — skipping"
          fi

      # --- Resolve packages ---
      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project TetraTrack.xcodeproj \
            -scheme TetraTrack

      # --- Build iPhone ---
      - name: Build iPhone
        run: |
          xcodebuild build \
            -project TetraTrack.xcodeproj \
            -scheme TetraTrack \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      # --- Build Watch app ---
      - name: Build Watch app
        run: |
          xcodebuild build \
            -project TetraTrack.xcodeproj \
            -scheme "TetraTrack Watch App Watch App" \
            -destination 'platform=watchOS Simulator,name=Apple Watch Series 11 (46mm)' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      # --- Build Widget ---
      - name: Build Widget extension
        run: |
          xcodebuild build \
            -project TetraTrack.xcodeproj \
            -scheme TetraTrackWidgetExtension \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      # --- Build Shared package ---
      - name: Build Shared package
        run: |
          xcodebuild build \
            -project TetraTrack.xcodeproj \
            -scheme TetraTrackShared \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      # --- Unit tests ---
      - name: Run unit tests
        run: |
          xcodebuild test \
            -project TetraTrack.xcodeproj \
            -scheme TetraTrack \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

  deploy:
    name: Deploy to TestFlight
    runs-on: macos-26
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Install fastlane
        run: bundle install --jobs 4 --retry 3

      - name: Create temporary keychain
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Install distribution certificate
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          echo "$DIST_CERT_P12_BASE64" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/certificate.p12

      - name: Write App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: echo "$ASC_KEY_P8" | base64 --decode > "$GITHUB_WORKSPACE/AuthKey_CI.p8"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project TetraTrack.xcodeproj \
            -scheme TetraTrack

      - name: Deploy to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ github.workspace }}/AuthKey_CI.p8
        run: bundle exec fastlane beta

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true
          rm -f "$GITHUB_WORKSPACE/AuthKey_CI.p8"
